<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>MyTasks</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <div id="app">
    <!-- Connecting Splash -->
    <div id="splash" class="auth-gate" hidden>
      <div class="auth-card">
        <h1>MyTasks</h1>
        <p class="splash-status">Connecting...</p>
      </div>
    </div>

    <!-- Auth Gate -->
    <div id="auth-gate" class="auth-gate" hidden>
      <div class="auth-card">
        <h1>MyTasks</h1>
        <p>Enter your API key to continue</p>
        <input type="password" id="api-key-input" placeholder="API key" autocomplete="off">
        <button id="auth-submit" class="btn btn-primary">Connect</button>
        <p id="auth-error" class="error-text" hidden></p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" hidden>
      <header>
        <div class="header-content">
          <nav class="header-tabs">
            <button class="tab active" data-view="shopping">Shopping</button>
            <button class="tab" data-view="tasks">Tasks</button>
          </nav>
          <div class="header-actions">
            <button id="refresh-btn" class="btn btn-ghost" title="Refresh">&#x21bb;</button>
            <button id="logout-btn" class="btn btn-ghost" title="Disconnect">Uitloggen</button>
          </div>
        </div>
      </header>

      <!-- Tasks View -->
      <div id="tasks-view" hidden>
        <div class="filters">
          <input type="search" id="filter-search" placeholder="Search tasks...">
          <select id="filter-status">
            <option value="">All statuses</option>
            <option value="backlog">Backlog</option>
            <option value="todo">To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <select id="filter-priority">
            <option value="">All priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div id="task-list" class="task-list">
          <div class="loading">Loading tasks...</div>
        </div>
        <div id="empty-state" class="empty-state" hidden>
          <p>No tasks found</p>
        </div>
        <button id="add-task-btn" class="fab" title="Add task">+</button>
      </div>

      <!-- Shopping View -->
      <div id="shopping-view">
        <div class="shopping-add">
          <input type="text" id="shopping-add-input" placeholder="Add item..." autocomplete="off">
        </div>
        <div id="shopping-list" class="shopping-list"></div>
        <div id="shopping-empty" class="empty-state" hidden>
          <p>Shopping list is empty</p>
        </div>
      </div>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title">New Task</h2>
          <button id="modal-close" class="btn btn-ghost">&#x2715;</button>
        </div>
        <form id="task-form">
          <input type="hidden" id="task-id">
          <div class="form-group">
            <label for="task-title">Title</label>
            <input type="text" id="task-title" required placeholder="What needs to be done?">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="task-status">Status</label>
              <select id="task-status">
                <option value="backlog">Backlog</option>
                <option value="todo" selected>To Do</option>
                <option value="in-progress">In Progress</option>
                <option value="done">Done</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="form-group">
              <label for="task-priority">Priority</label>
              <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="task-due">Due Date</label>
            <input type="date" id="task-due">
          </div>
          <div class="form-group">
            <label for="task-notes">Notes</label>
            <textarea id="task-notes" rows="3" placeholder="Additional details..."></textarea>
          </div>
          <div class="form-actions">
            <button type="button" id="delete-task-btn" class="btn btn-danger" hidden>Delete</button>
            <div class="form-actions-right">
              <button type="button" id="cancel-btn" class="btn btn-ghost">Cancel</button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" hidden></div>
  </div>

  <script src="app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
